name: CI

on:
  push:
    branches: [main, master, V2-development, v2-development]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
              Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force -AllowClobber
          Import-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Force
      - name: Analyze repository
        shell: pwsh
        run: |
          $issues = @(Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1)
          $issues | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
          if ($issues.Count -gt 0) { throw "PSScriptAnalyzer reported $($issues.Count) issue(s)." }

  test-pwsh:
    name: PowerShell 7 / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
              Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -AllowClobber
          Import-Module Pester -RequiredVersion 5.7.1 -Force
      - name: Run Pester
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  test-windows-powershell:
    name: Windows PowerShell 5.1
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install Pester
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
              Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -AllowClobber
          Import-Module Pester -RequiredVersion 5.7.1 -Force
      - name: Run Pester
        shell: powershell
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = '.\tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  package:
    name: Build release artifact
    needs: [lint, test-pwsh, test-windows-powershell]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install build dependencies
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
              Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -AllowClobber
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force -AllowClobber
          Import-Module Pester -RequiredVersion 5.7.1 -Force
          Import-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Force
      - name: Build package twice and verify reproducibility
        shell: pwsh
        run: |
          ./build/New-ReleasePackage.ps1 -OutputDirectory ./artifacts-one
          ./build/New-ReleasePackage.ps1 -SkipTests -OutputDirectory ./artifacts-two
          $first = (Get-FileHash ./artifacts-one/OffsetInspect-*.zip -Algorithm SHA256).Hash
          $second = (Get-FileHash ./artifacts-two/OffsetInspect-*.zip -Algorithm SHA256).Hash
          if ($first -ne $second) {
              throw "Release archives are not reproducible: $first != $second"
          }
          Move-Item -Path ./artifacts-one -Destination ./artifacts
          Remove-Item -Path ./artifacts-two -Recurse -Force
      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: OffsetInspect-release
          path: artifacts/*
          if-no-files-found: error
