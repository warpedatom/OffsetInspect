name: Generate SHA256 Hashes for Release Source Archives

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  generate-checksums:
    runs-on: ubuntu-latest

    steps:
      - name: Download release source archives
        run: |
          TAG="${{ github.event.release.tag_name }}"
          REPO="${{ github.repository }}"

          curl -L "https://github.com/${REPO}/archive/refs/tags/${TAG}.zip" -o "Source-code-${TAG}.zip"
          curl -L "https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz" -o "Source-code-${TAG}.tar.gz"

      - name: Generate SHA256 checksums
        run: |
          sha256sum Source-code-* > checksums.txt
          cat checksums.txt

      - name: Upload checksum file to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
